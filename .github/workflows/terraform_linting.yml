---
name: Terraform Linting

on:
  workflow_call:

jobs:
  linting:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: check format
        uses: dflook/terraform-fmt-check@59168426e242f665bf7b70644d706224e665056a # v2
        with:
          path: .

      - name: validate
        uses: dflook/terraform-validate@4cef5d8a4b92bcd88486e41e22a42942a382c9d6 # v2
        with:
          path: .

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@6e1e0642c0289bd619021bf6b34e3c08ed1e005a # v6

      - name: tflint
        run: tflint --recursive
